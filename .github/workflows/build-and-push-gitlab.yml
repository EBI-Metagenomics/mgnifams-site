name: Build and push GitLab image

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

env:
  GITLAB_REGISTRY: ${{ vars.GITLAB_REGISTRY }}
  GITLAB_REGISTRY_IMAGE: ${{ vars.GITLAB_REGISTRY_IMAGE }}

jobs:
  build-and-push:
    name: Build and push GitLab image
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate registry settings
        run: |
          test -n "${GITLAB_REGISTRY}" || (echo "GITLAB_REGISTRY repository variable is not set" && exit 1)
          test -n "${GITLAB_REGISTRY_IMAGE}" || (echo "GITLAB_REGISTRY_IMAGE repository variable is not set" && exit 1)

          case "${GITLAB_REGISTRY_IMAGE}" in
            "${GITLAB_REGISTRY}"/*) ;;
            *)
              echo "GITLAB_REGISTRY_IMAGE must start with ${GITLAB_REGISTRY}/"
              exit 1
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitLab registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GITLAB_REGISTRY }}
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ vars.GITLAB_REGISTRY_IMAGE }}:latest
            ${{ vars.GITLAB_REGISTRY_IMAGE }}:ebi-wp-k8s-hl
            ${{ vars.GITLAB_REGISTRY_IMAGE }}:${{ github.event.workflow_run.head_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}

  deploy:
    name: Deploy to EBI WebProd Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          test -n "${KUBE_CONFIG}" || (echo "KUBE_CONFIG secret is not set" && exit 1)
          mkdir -p "${HOME}/.kube"
          printf '%s' "${KUBE_CONFIG}" > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"

      - name: Apply Kubernetes manifest
        run: kubectl apply -f deployment/ebi-wp-k8s-hl.yaml

      - name: Restart deployment
        run: kubectl rollout restart deployment mgnifams-site -n mgnifams-hl-exp

      - name: Wait for rollout
        run: kubectl rollout status deployment mgnifams-site -n mgnifams-hl-exp
