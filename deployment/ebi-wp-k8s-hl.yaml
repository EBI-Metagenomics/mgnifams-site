---
apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: Namespace
    metadata:
      name: cazymes-hl-exp
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: proxy-config
      namespace: cazymes-hl-exp
    data:
      HTTP_PROXY: "http://hh-wwwcache.ebi.ac.uk:3128"
      HTTPS_PROXY: "http://hh-wwwcache.ebi.ac.uk:3128"
      http_proxy: "http://hh-wwwcache.ebi.ac.uk:3128"
      https_proxy: "http://hh-wwwcache.ebi.ac.uk:3128"
      no_proxy: "localhost,.cluster.local"
      ALLOWED_HOST: "cazymes-demo.mgnify.org"

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: cazymes-site
      namespace: cazymes-hl-exp
      labels:
        app: cazymes-site
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: cazymes-site
      template:
        metadata:
          labels:
            app: cazymes-site
        spec:
          securityContext:
            runAsUser: 7123
            runAsGroup: 1347
          volumes:
            - name: cazymes-app-storage
              persistentVolumeClaim:
                claimName: cazymes-volume-claim
          containers:
            - image: quay.io/microbiome-informatics/cazymes_site:cazymes-hl-exp
              imagePullPolicy: Always
              name: cazymes-site
              envFrom:
                - configMapRef:
                    name: proxy-config
              ports:
                - containerPort: 8000
                  name: django
              volumeMounts:
              - mountPath: "/app/dbs"
                name: cazymes-app-storage
          imagePullSecrets:
            - name: quay-pull-secret
  - apiVersion: v1
    kind: Service
    metadata:
      name: cazymes-site
      namespace: cazymes-hl-exp
      labels:
        app: cazymes-site
    spec:
      type: NodePort
      selector:
        app: cazymes-site
      ports:
        - port: 8000
          targetPort: 8000
          protocol: TCP
  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: cazymes-ingress
      namespace: cazymes-hl-exp
      annotations:
        kubernetes.io/ingress.class: "nginx"
    spec:
      rules:
        - host: cazymes-demo.mgnify.org
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: cazymes-site
                    port:
                      number: 8000
  - apiVersion: v1
    kind: PersistentVolume
    metadata:
      name: cazymes-vol-1
      namespace: cazymes-hl-exp
    spec:
      capacity:
        storage: 8Gi
      volumeMode: Filesystem
      accessModes:
        - ReadOnlyMany
      persistentVolumeReclaimPolicy: Recycle
      mountOptions:
        - nfsvers=3
      nfs:
        server: hh-isi-srv-vlan1496.ebi.ac.uk
        path: /ifs/public/rw/metagenomics/cazymes/dbs
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: cazymes-volume-claim
      namespace: cazymes-hl-exp
    spec:
      storageClassName: ""
      accessModes:
        - ReadOnlyMany
      resources:
        requests:
          storage: 6Gi
      volumeName: cazymes-vol-1
      